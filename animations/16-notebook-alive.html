<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook Alive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #E8E0D0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: sans-serif;
  }

  #notebook {
    position: relative;
    width: 640px;
    height: 400px;
    background: #FDF8E8;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  #letter-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="notebook">
  <canvas id="bg-canvas" width="640" height="400"></canvas>
  <canvas id="letter-canvas" width="640" height="400"></canvas>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const W = 640, H = 400;
const LINE_SPACING = 32;
const MARGIN_LEFT = 78;    // right of red line
const MARGIN_RIGHT = 620;
const MARGIN_TOP = 24;     // where first line starts
const RED_LINE_X = 60;

const INK_COLOR = '#2C3E50';
const ALIVE_COLORS = ['#FF8C00', '#4169E1', '#FF1493', '#32CD32', '#ADFF2F'];
const FONT_SIZE = 20;
const FONT = `${FONT_SIZE}px 'Segoe UI', 'Patrick Hand', cursive`;

// notebook lines (y positions)
const LINES = [];
for (let y = MARGIN_TOP + LINE_SPACING; y < H - 10; y += LINE_SPACING) {
  LINES.push(y);
}

// ─── Text content ─────────────────────────────────────────────────────────────
const SENTENCES = [
  "The quick brown fox jumps over the lazy dog.",
  "Learning is a journey, not a destination.",
  "Every letter has a story waiting to be told.",
  "Curiosity is the engine of achievement.",
  "Write it down before you forget again.",
  "Small steps every day lead somewhere great.",
  "The best ideas come when least expected.",
  "Keep going, you are doing just fine.",
];

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
const ltCanvas = document.getElementById('letter-canvas');
const ltCtx = ltCanvas.getContext('2d');

// ─── Draw static background (lines) ──────────────────────────────────────────
function drawBackground() {
  bgCtx.clearRect(0, 0, W, H);

  // horizontal lines
  bgCtx.strokeStyle = 'rgba(100, 150, 200, 0.3)';
  bgCtx.lineWidth = 1;
  for (const y of LINES) {
    bgCtx.beginPath();
    bgCtx.moveTo(0, y);
    bgCtx.lineTo(W, y);
    bgCtx.stroke();
  }

  // red margin line
  bgCtx.strokeStyle = 'rgba(200, 100, 100, 0.3)';
  bgCtx.lineWidth = 1.5;
  bgCtx.beginPath();
  bgCtx.moveTo(RED_LINE_X, 0);
  bgCtx.lineTo(RED_LINE_X, H);
  bgCtx.stroke();
}

// ─── Letter data structures ───────────────────────────────────────────────────
// Each letter: { char, x, y (baseline), lineIndex, charIndex, alive: bool, ghost: bool }
let allLetters = [];

function buildLetters() {
  allLetters = [];
  ltCtx.font = FONT;

  const usableLines = LINES.slice(0, 8);
  const sentences = SENTENCES.slice(0, usableLines.length);

  sentences.forEach((sentence, lineIdx) => {
    const baseY = usableLines[lineIdx];
    let curX = MARGIN_LEFT;

    for (let ci = 0; ci < sentence.length; ci++) {
      const ch = sentence[ci];
      const w = ltCtx.measureText(ch).width;
      if (curX + w > MARGIN_RIGHT) break;

      allLetters.push({
        char: ch,
        originX: curX,
        originY: baseY,
        lineY: baseY,
        charIndex: ci,
        lineIndex: lineIdx,
        alive: false,
        ghosted: false,
        // animation state (used when alive)
        x: curX,
        y: baseY,
        vx: 0,
        vy: 0,
        angle: 0,
        scale: 1,
        color: INK_COLOR,
        phase: 'idle',  // idle | struggle | bounce | wander | return
        phaseTimer: 0,
        bounceCount: 0,
        wanderDir: 1,
        wanderTimer: 0,
        lookTimer: 0,
        lookAngle: 0,
      });

      curX += w;
    }
  });
}

// ─── Physics helpers ──────────────────────────────────────────────────────────
const GRAVITY = 1800;   // px/s²
const BOUNCE_DECAY = 0.65;
const ALIVE_COLOR_LIST = [...ALIVE_COLORS];

function pickAliveColor() {
  return ALIVE_COLOR_LIST[Math.floor(Math.random() * ALIVE_COLOR_LIST.length)];
}

function randBetween(a, b) { return a + Math.random() * (b - a); }

// ─── Activate a letter ────────────────────────────────────────────────────────
function activateLetter(letter) {
  if (letter.alive || letter.char === ' ') return;

  letter.alive = true;
  letter.ghosted = true;
  letter.x = letter.originX;
  letter.y = letter.originY;
  letter.vx = 0;
  letter.vy = 0;
  letter.angle = 0;
  letter.scale = 1;
  letter.color = pickAliveColor();
  letter.phase = 'struggle';
  letter.phaseTimer = 0;
  letter.bounceCount = 0;
  letter.wanderDir = Math.random() < 0.5 ? 1 : -1;
  letter.wanderTimer = randBetween(1.5, 3.5);
  letter.lookTimer = 0;
  letter.lookAngle = 0;
  letter.struggleShake = 0;
  letter.struggleDuration = 0.3;
}

// ─── Deactivate (return home) ─────────────────────────────────────────────────
function returnLetter(letter) {
  letter.phase = 'return';
  letter.phaseTimer = 0;
  letter.returnStartX = letter.x;
  letter.returnStartY = letter.y;
}

// ─── Update a single letter ───────────────────────────────────────────────────
function updateLetter(letter, dt) {
  if (!letter.alive) return;

  letter.phaseTimer += dt;

  if (letter.phase === 'struggle') {
    // shake in place
    letter.struggleShake = Math.sin(letter.phaseTimer * Math.PI * 2 * 20) * 3 * (1 - letter.phaseTimer / letter.struggleDuration);
    letter.scale = 1 + 0.05 * Math.sin(letter.phaseTimer * Math.PI * 2 * 15);

    if (letter.phaseTimer >= letter.struggleDuration) {
      // launch upward
      letter.phase = 'bounce';
      letter.phaseTimer = 0;
      letter.vy = -randBetween(200, 320);
      letter.vx = letter.wanderDir * randBetween(30, 80);
      letter.scale = randBetween(1.2, 1.3);
      letter.color = pickAliveColor();
      letter.struggleShake = 0;
    }
    return;
  }

  if (letter.phase === 'bounce') {
    // apply gravity
    letter.vy += GRAVITY * dt;
    letter.x += letter.vx * dt;
    letter.y += letter.vy * dt;

    // clamp horizontal
    const minX = RED_LINE_X + 4;
    const maxX = MARGIN_RIGHT - 12;
    if (letter.x < minX) { letter.x = minX; letter.vx = Math.abs(letter.vx) * 0.6; }
    if (letter.x > maxX) { letter.x = maxX; letter.vx = -Math.abs(letter.vx) * 0.6; }

    // bounce on the origin line
    if (letter.y >= letter.lineY && letter.vy > 0) {
      letter.y = letter.lineY;
      letter.vy *= -BOUNCE_DECAY;
      letter.bounceCount++;
      // slight color change on bounce
      if (Math.random() < 0.4) letter.color = pickAliveColor();

      // after enough bounces, switch to wander
      if (letter.bounceCount >= 3 && Math.abs(letter.vy) < 60) {
        letter.vy = 0;
        letter.y = letter.lineY;
        letter.phase = 'wander';
        letter.phaseTimer = 0;
        letter.lookTimer = 0;
        letter.lookAngle = 0;
      }
    }

    // spin while airborne
    letter.angle = letter.vx * 0.006;

    // check wander timer
    letter.wanderTimer -= dt;
    if (letter.wanderTimer <= 0) {
      returnLetter(letter);
    }
    return;
  }

  if (letter.phase === 'wander') {
    // walk horizontally
    letter.x += letter.wanderDir * 40 * dt;

    // clamp
    if (letter.x < RED_LINE_X + 4 || letter.x > MARGIN_RIGHT - 12) {
      letter.wanderDir *= -1;
    }

    // look around (sway)
    letter.lookTimer += dt;
    if (letter.lookTimer > 0.4) {
      letter.lookTimer = 0;
      const maxLook = (10 * Math.PI) / 180;
      letter.lookAngle = randBetween(-maxLook, maxLook);
    }
    letter.angle += (letter.lookAngle - letter.angle) * dt * 8;

    // small bob
    letter.y = letter.lineY + Math.sin(letter.phaseTimer * Math.PI * 4) * 2;

    letter.wanderTimer -= dt;
    if (letter.wanderTimer <= 0) {
      returnLetter(letter);
    }
    return;
  }

  if (letter.phase === 'return') {
    const t = Math.min(letter.phaseTimer / 0.5, 1);
    // ease in-out
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

    letter.x = letter.returnStartX + (letter.originX - letter.returnStartX) * ease;
    letter.y = letter.returnStartY + (letter.originY - letter.returnStartY) * ease;
    letter.angle = letter.angle * (1 - ease);
    letter.scale = letter.scale + (1 - letter.scale) * ease;

    if (t >= 1) {
      letter.x = letter.originX;
      letter.y = letter.originY;
      letter.angle = 0;
      letter.scale = 1;
      letter.color = INK_COLOR;
      letter.alive = false;
      letter.ghosted = false;
      letter.phase = 'idle';
    }
    return;
  }
}

// ─── Render all letters ───────────────────────────────────────────────────────
function renderLetters() {
  ltCtx.clearRect(0, 0, W, H);
  ltCtx.font = FONT;
  ltCtx.textBaseline = 'alphabetic';

  for (const letter of allLetters) {
    if (letter.char === ' ') continue;

    if (letter.ghosted && !letter.alive) {
      // shouldn't happen — handled below
    }

    if (!letter.alive) {
      // static letter
      ltCtx.globalAlpha = 1;
      ltCtx.fillStyle = INK_COLOR;
      ltCtx.save();
      ltCtx.translate(letter.originX, letter.originY);
      ltCtx.fillText(letter.char, 0, 0);
      ltCtx.restore();
    } else {
      // ghost (placeholder)
      ltCtx.globalAlpha = 0.15;
      ltCtx.fillStyle = INK_COLOR;
      ltCtx.save();
      ltCtx.translate(letter.originX, letter.originY);
      ltCtx.fillText(letter.char, 0, 0);
      ltCtx.restore();
      ltCtx.globalAlpha = 1;

      // alive letter
      ltCtx.save();
      const offsetX = letter.struggleShake || 0;
      ltCtx.translate(letter.x + offsetX, letter.y);
      ltCtx.rotate(letter.angle);
      ltCtx.scale(letter.scale, letter.scale);
      ltCtx.fillStyle = letter.color;
      // center horizontally on pivot
      const cw = ltCtx.measureText(letter.char).width;
      ltCtx.fillText(letter.char, -cw / 2, 0);
      ltCtx.restore();
    }
  }

  ltCtx.globalAlpha = 1;
}

// ─── Trigger scheduler ────────────────────────────────────────────────────────
let nextTrigger = randBetween(2, 4);

function maybeActivate(dt) {
  nextTrigger -= dt;
  if (nextTrigger > 0) return;

  // pick 1 or 2 letters
  const count = Math.random() < 0.35 ? 2 : 1;
  const candidates = allLetters.filter(l => !l.alive && l.char !== ' ' && /[a-zA-Z]/.test(l.char));
  if (candidates.length === 0) return;

  for (let i = 0; i < count; i++) {
    const idx = Math.floor(Math.random() * candidates.length);
    const chosen = candidates.splice(idx, 1)[0];
    activateLetter(chosen);
  }

  nextTrigger = randBetween(3, 5);
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lastTime = null;

function loop(ts) {
  const t = ts / 1000;
  const dt = lastTime === null ? 0 : Math.min(t - lastTime, 0.05);
  lastTime = t;

  maybeActivate(dt);

  for (const letter of allLetters) {
    updateLetter(letter, dt);
  }

  renderLetters();
  requestAnimationFrame(loop);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
drawBackground();
buildLetters();
requestAnimationFrame(loop);
</script>
</body>
</html>
