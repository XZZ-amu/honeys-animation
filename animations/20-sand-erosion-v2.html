<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand Erosion v2 – ByteDance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #C8BFA8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #notebook {
    position: relative;
    width: 720px;
    height: 448px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.22), 0 1px 4px rgba(0,0,0,0.12);
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    display: block;
  }
</style>
</head>
<body>
<div id="notebook">
  <canvas id="c" width="720" height="448"></canvas>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const W = 720, H = 448;
const LINE_SPACING = 32;
const MARGIN_LEFT  = 60;
const MARGIN_TOP   = 20;
const PAPER_COLOR  = '#FDF8E8';
const LINE_COLOR   = 'rgba(100,150,200,0.3)';
const RED_LINE_X   = 60;
const RED_LINE     = 'rgba(200,100,100,0.3)';
const INK          = '#2C3E50';
const BD_COLOR     = '#4169E1';
const FONT_SIZE    = 19;
const FONT         = `${FONT_SIZE}px 'Segoe Script','Caveat','Comic Sans MS',cursive`;

// Timeline (seconds)
const T_STATIC     = 1.0;   // 0 → 1.0  pure static (shorter)
const T_OMEN_END   = 1.0;   // no premonition
const T_SCATTER_END= 3.5;   // 1.0 → 3.5  letters fly away (2.5s, faster)
const T_REVEAL_END = 5.0;   // 3.5 → 5.0  ByteDance color shift
const T_FADE_START = 5.5;
const T_FADE_END   = 6.5;
const CYCLE        = 6.5;

// ─── Text lines (7 lines; ByteDance in line index 3) ─────────────────────────
const LINES = [
  "Every morning the quiet hum of servers fills the air,",
  "packets traveling across invisible highways of light.",
  "Somewhere a function returns, a promise resolves,",
  "and the ByteDance dream pulses through the network.",
  "Engineers weave logic into elegant tapestries of code,",
  "each commit a small step toward something larger.",
  "The cursor blinks, patient as ever, waiting.",
];
const BD_WORD = "ByteDance";
const BD_LINE = 3;

// ─── Canvas & context ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ─── Color helpers ────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function lerpColor(a, b, t) {
  const [r1,g1,b1] = hexToRgb(a), [r2,g2,b2] = hexToRgb(b);
  t = Math.max(0, Math.min(1, t));
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ─── Off-screen canvas for pixel sampling ─────────────────────────────────────
const offCanvas = document.createElement('canvas');
offCanvas.width  = 64;
offCanvas.height = 40;
const offCtx = offCanvas.getContext('2d');

// Sample a letter's pixels and return array of {ox, oy} offsets relative to
// the letter's anchor point (x, y-FONT_SIZE). Sampling step 2px for ~50-80 grains.
function sampleLetterGrains(ch, STEP) {
  const step = STEP || 2;
  offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
  offCtx.font = FONT;
  offCtx.textBaseline = 'alphabetic';
  offCtx.fillStyle = '#000';
  // Draw at (4, FONT_SIZE+4) so we don't clip ascenders
  const drawX = 4;
  const drawY = FONT_SIZE + 4;
  offCtx.fillText(ch, drawX, drawY);

  const imgData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
  const grains = [];
  for (let py = 0; py < offCanvas.height; py += step) {
    for (let px = 0; px < offCanvas.width; px += step) {
      const idx = (py * offCanvas.width + px) * 4;
      const alpha = imgData.data[idx + 3];
      if (alpha > 80) {
        // ox/oy relative to letter anchor (l.x, l.y)
        grains.push({ ox: px - drawX, oy: py - drawY });
      }
    }
  }
  return grains;
}

// ─── Measure all letter positions ────────────────────────────────────────────
let letters = [];   // { ch, x, y, w, isBD, row, col, edginess, sparseness, grains }

function measureLetters() {
  ctx.font = FONT;
  ctx.textBaseline = 'alphabetic';
  letters = [];

  LINES.forEach((line, row) => {
    const baseY = MARGIN_TOP + (row + 1) * LINE_SPACING;
    let curX = MARGIN_LEFT + 8;
    const bdStart = line.indexOf(BD_WORD);
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      const w  = ctx.measureText(ch).width;
      const isBD = (row === BD_LINE) && bdStart !== -1 && col >= bdStart && col < bdStart + BD_WORD.length;

      // "grip" factors: higher = harder to blow away
      const lineW = ctx.measureText(line).width;
      const posInLine = (curX - MARGIN_LEFT) / lineW;
      const edginess = posInLine > 0.5 ? posInLine : (1 - posInLine);
      const sparse = /[.,!?; ]/.test(ch) ? 1 : 0;

      // Sample pixel grains for this letter
      // Space gets 0 grains (invisible)
      const step = (ch === ' ') ? 99 : 2;
      const grains = sampleLetterGrains(ch, step);

      letters.push({ ch, x: curX, y: baseY, w, isBD, row, col, edginess, sparse, grains });
      curX += w;
    }
  });
}

// ─── Wind burst schedule ──────────────────────────────────────────────────────
const GUSTS = [
  { time: 2.0, strength: 0.15 },
  { time: 2.7, strength: 0.30 },
  { time: 3.3, strength: 0.45 },
  { time: 3.9, strength: 0.70 },
  { time: 4.4, strength: 0.85 },
  { time: 4.9, strength: 1.00 },
];

// ─── Assign departure delays ──────────────────────────────────────────────────
function buildSchedule(nonBDLetters) {
  const scored = nonBDLetters.map((l, i) => {
    const leftBias = (l.x - MARGIN_LEFT) / (W - MARGIN_LEFT);
    const grip = (1 - l.edginess) * 0.5 + (l.sparse ? 0 : 0.3) + leftBias * 0.2;
    const score = grip + Math.random() * 0.3;
    return { idx: i, score, letter: l };
  });
  scored.sort((a, b) => a.score - b.score);

  const n = scored.length;
  const result = new Array(n);
  scored.forEach((item, rank) => {
    const frac = rank / (n - 1);
    const tFrac = Math.pow(frac, 0.7);
    const base = T_OMEN_END + tFrac * (T_SCATTER_END - T_OMEN_END - 1.0);
    const snap = gustSnap(base);
    result[item.idx] = snap;
  });
  return result;
}

function gustSnap(t) {
  let nearest = GUSTS[0], minD = Infinity;
  for (const g of GUSTS) {
    const d = Math.abs(g.time - t);
    if (d < minD) { minD = d; nearest = g; }
  }
  const snapped = nearest.time + (Math.random() - 0.5) * 0.35;
  return 0.4 * snapped + 0.6 * t;
}

// ─── FloatingLetter class ─────────────────────────────────────────────────────
class FloatingLetter {
  constructor(letter, departureTime) {
    this.l      = letter;
    this.depT   = departureTime;
    this.phase  = 'static';   // static | flying | gone

    // flight physics
    this.fx = letter.x;
    this.fy = letter.y;

    const angleDeg = -(15 + Math.random() * 25);
    const angleRad = angleDeg * Math.PI / 180;
    const speed    = 150 + Math.random() * 200;
    this.vx = Math.cos(angleRad) * speed;
    this.vy = Math.sin(angleRad) * speed;

    this.ax = 300 + Math.random() * 200;
    this.ay = -20 + Math.random() * 15;
    this.drag   = 0.990 + Math.random() * 0.005;

    this.swayAmp   = 18 + Math.random() * 22;
    this.swayFreq  = 0.4 + Math.random() * 0.5;
    this.swayPhase = Math.random() * Math.PI * 2;

    this.rot      = 0;
    this.rotSpeed = (Math.random() - 0.5) * 2.2;
    this.scale    = 1;
    this.flyT     = 0;
    this.flyDur   = 2.0 + Math.random() * 1.0;

    // ── Sand grain state ──────────────────────────────────────────────────────
    // Each grain: { ox, oy, releaseProgress, released, detached: { x, y, vx, vy, alpha, life, maxLife } }
    const rawGrains = letter.grains;
    const charW = Math.max(letter.w || 1, 1);

    // Compute x range for normalization
    let minOx = Infinity, maxOx = -Infinity;
    for (const g of rawGrains) {
      if (g.ox < minOx) minOx = g.ox;
      if (g.ox > maxOx) maxOx = g.ox;
    }
    const oxRange = Math.max(maxOx - minOx, 1);

    this.grains = rawGrains.map(g => {
      // Left-to-right: leftmost ox releases first (releaseProgress near 0)
      const normOx = (g.ox - minOx) / oxRange; // 0=leftmost, 1=rightmost
      // Add ±20% random jitter
      const rp = Math.max(0, Math.min(1, normOx + (Math.random() - 0.5) * 0.4));
      return {
        ox: g.ox,
        oy: g.oy,
        releaseProgress: rp,
        released: false,
        detached: null,
      };
    });

    this.allGone = false;
  }

  update(dt, cycleTime) {
    if (this.phase === 'gone') return;

    if (this.phase === 'static') {
      if (cycleTime >= this.depT) {
        this.phase = 'flying';
        this.fx = this.l.x;
        this.fy = this.l.y;
      }
      return;
    }

    if (this.phase === 'flying') {
      this.flyT += dt;

      const accelPhase = Math.min(this.flyT / 0.5, 1);
      const ax = this.ax * accelPhase;

      this.vx += ax * dt;
      this.vy += this.ay * dt;
      this.vx *= this.drag;
      this.vy *= this.drag;

      const swayMag = this.swayAmp * Math.sin(this.swayFreq * this.flyT * Math.PI * 2 + this.swayPhase);
      const swayVY = swayMag * 25;

      this.fx += this.vx * dt;
      this.fy += (this.vy + swayVY * dt) * dt;

      this.rot   += this.rotSpeed * dt;
      this.scale  = Math.max(0.3, 1 - this.flyT * 0.15);

      // flyProgress 0→1 drives grain release
      const flyProgress = Math.min(this.flyT / this.flyDur, 1);

      let attachedCount = 0;
      let anyActive = false;

      for (const grain of this.grains) {
        if (!grain.released) {
          // Check if this grain should detach
          if (flyProgress >= grain.releaseProgress) {
            grain.released = true;
            // Grain world position when it detaches (based on letter's current pos + rotation)
            const cx = this.fx + this.l.w / 2;
            const cy = this.fy;
            // Apply rotation + scale to get grain world pos
            const cosR = Math.cos(this.rot);
            const sinR = Math.sin(this.rot);
            const gox = grain.ox * this.scale;
            const goy = grain.oy * this.scale;
            const wx = cx + cosR * gox - sinR * goy;
            const wy = cy + sinR * gox + cosR * goy;
            grain.detached = {
              x: wx,
              y: wy,
              vx: this.vx * 0.3 + 200 + Math.random() * 200, // blast rightward
              vy: (Math.random() - 0.5) * 40,
              alpha: 0.9,
              life: 0,
              maxLife: 0.2 + Math.random() * 0.2,
            };
          } else {
            attachedCount++;
          }
        }

        // Update detached grains
        if (grain.detached) {
          const d = grain.detached;
          d.life += dt;
          d.x += d.vx * dt;
          d.y += d.vy * dt;
          d.vx *= 0.96;
          d.vy *= 0.97;
          d.alpha = Math.max(0, 0.9 * (1 - d.life / d.maxLife));
          if (d.life < d.maxLife) anyActive = true;
        }
      }

      if (attachedCount === 0 && !anyActive) {
        this.phase = 'gone';
      }
      if (this.fx > W + 100) {
        this.phase = 'gone';
      }
    }
  }

  draw(ctx) {
    if (this.phase === 'gone') return;
    ctx.save();

    if (this.phase === 'static') {
      // Draw attached grains at rest position
      ctx.fillStyle = INK;
      ctx.globalAlpha = 1;
      for (const grain of this.grains) {
        ctx.fillRect(this.l.x + grain.ox, this.l.y + grain.oy, 1, 1);
      }

    } else if (this.phase === 'flying') {
      const cx = this.fx + this.l.w / 2;
      const cy = this.fy;

      const cosR = Math.cos(this.rot);
      const sinR = Math.sin(this.rot);

      ctx.fillStyle = INK;
      ctx.globalAlpha = 1;

      for (const grain of this.grains) {
        if (!grain.released) {
          // Attached grain: follow letter with rotation + scale
          const gox = grain.ox * this.scale;
          const goy = grain.oy * this.scale;
          const wx = cx + cosR * gox - sinR * goy;
          const wy = cy + sinR * gox + cosR * goy;
          ctx.fillRect(wx, wy, 1, 1);
        } else if (grain.detached && grain.detached.alpha > 0.01) {
          // Detached grain flying away
          ctx.globalAlpha = grain.detached.alpha;
          ctx.fillRect(grain.detached.x, grain.detached.y, 1, 1);
          ctx.globalAlpha = 1;
        }
      }
    }
    ctx.restore();
  }
}

// ─── StableLetter (ByteDance) ─────────────────────────────────────────────────
class StableLetter {
  constructor(letter) {
    this.l         = letter;
    this.wobbled   = false;
    this.wobbleT   = 0;
    this.wobbleDur = 0.25;
    this.offset    = 0;
    const relX = (letter.x - MARGIN_LEFT) / (W - MARGIN_LEFT);
    this.windArrival = T_OMEN_END + relX * 0.15;
  }

  update(dt, cycleTime) {
    if (!this.wobbled && cycleTime >= this.windArrival) {
      this.wobbled = true;
      this.wobbleT = 0;
      this.flying = true;
    }
    if (this.wobbled && !this.flying && this.wobbleT < this.wobbleDur) {
      this.wobbleT += dt;
      const t = this.wobbleT / this.wobbleDur;
      this.offset = Math.sin(t * Math.PI * 5) * 1.5 * (1 - t);
    } else {
      this.offset = 0;
    }
  }

  draw(ctx, colorProgress) {
    ctx.save();
    const color = lerpColor(INK, BD_COLOR, colorProgress);
    ctx.globalAlpha = 1;

    // Draw grains (never detach, always at rest position + wobble offset)
    ctx.fillStyle = color;
    for (const grain of this.l.grains) {
      ctx.fillRect(
        this.l.x + this.offset + grain.ox,
        this.l.y + grain.oy,
        1, 1
      );
    }
    ctx.restore();
  }
}

// ─── Build particle lists ─────────────────────────────────────────────────────
let floaters = [];
let stables  = [];

function buildParticles() {
  measureLetters();
  floaters = [];
  stables  = [];

  const nonBD = letters.filter(l => !l.isBD);
  const departures = buildSchedule(nonBD);

  nonBD.forEach((l, i) => {
    floaters.push(new FloatingLetter(l, departures[i]));
  });

  letters.filter(l => l.isBD).forEach(l => {
    stables.push(new StableLetter(l));
  });
}

// ─── Draw notebook background ─────────────────────────────────────────────────
function drawNotebook() {
  ctx.fillStyle = PAPER_COLOR;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = LINE_COLOR;
  ctx.lineWidth   = 1;
  for (let y = MARGIN_TOP + LINE_SPACING; y < H - 8; y += LINE_SPACING) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  ctx.strokeStyle = RED_LINE;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(RED_LINE_X, 0);
  ctx.lineTo(RED_LINE_X, H);
  ctx.stroke();
}

// ─── Global premonition effect ────────────────────────────────────────────────
function leanOffset(cycleTime) {
  if (cycleTime < T_STATIC) return 0;
  if (cycleTime >= T_OMEN_END) return 0;
  const t = (cycleTime - T_STATIC) / (T_OMEN_END - T_STATIC);
  const lean = t < 0.6
    ? (t / 0.6) * 3.0
    : 3.0 * (1 - (t - 0.6) / 0.4);
  const tremor = Math.sin(t * Math.PI * 28) * 0.9 * (1 - t);
  return lean + tremor;
}

// ─── Main animation loop ──────────────────────────────────────────────────────
let cycleTime = 0;
let lastTS    = null;
let pageAlpha = 1;

function tick(ts) {
  if (!lastTS) lastTS = ts;
  const rawDt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS = ts;
  cycleTime += rawDt;

  if (cycleTime >= CYCLE) {
    cycleTime -= CYCLE;
    buildParticles();
  }

  if (cycleTime < 0.35) {
    pageAlpha = cycleTime / 0.35;
  } else if (cycleTime < T_FADE_START) {
    pageAlpha = 1;
  } else if (cycleTime < T_FADE_END) {
    pageAlpha = 1 - (cycleTime - T_FADE_START) / (T_FADE_END - T_FADE_START);
  } else {
    pageAlpha = 0;
  }

  const dt = (cycleTime >= T_STATIC) ? rawDt : 0;
  floaters.forEach(f => f.update(dt, cycleTime));
  stables.forEach(s => s.update(dt, cycleTime));

  let colorP = 0;
  if (cycleTime >= T_SCATTER_END && cycleTime < T_REVEAL_END) {
    colorP = (cycleTime - T_SCATTER_END) / (T_REVEAL_END - T_SCATTER_END);
  } else if (cycleTime >= T_REVEAL_END) {
    colorP = 1;
  }

  // ── Draw ─────────────────────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.globalAlpha = pageAlpha;

  drawNotebook();

  if (cycleTime < T_STATIC) {
    // Pure static: draw all letters as sand grains at rest
    ctx.fillStyle = INK;
    ctx.globalAlpha = 1;
    letters.forEach(l => {
      for (const grain of l.grains) {
        ctx.fillRect(l.x + grain.ox, l.y + grain.oy, 1, 1);
      }
    });

  } else {
    // Scatter + reveal phases
    floaters.forEach(f => f.draw(ctx));
    stables.forEach(s => s.draw(ctx, colorP));
  }

  ctx.restore();
  requestAnimationFrame(tick);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
buildParticles();
requestAnimationFrame(tick);
</script>
</body>
</html>
