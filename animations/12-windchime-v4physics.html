<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Chime – Sketch Style</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFFFF8;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── Physics (V4 exact copy) ────────────────────────────────────────────────
const GRAVITY_Y       = 980;
const DAMPING         = 0.965;
const CONSTRAINT_ITER = 20;
const WIND_MAX_IMPULSE  = 0.28;
const SWAY_BASE_IMPULSE = 0.055;

class Chain {
  constructor(anchorX, anchorY, items, segLen) {
    this.ax = anchorX;
    this.ay = anchorY;
    this.items = items;      // array of item descriptors
    this.segLen = segLen;
    this.breathPhase = Math.random() * Math.PI * 2;
    this.breathFreq  = 0.28 + Math.random() * 0.14;

    const n = items.length + 1;
    this.nodes = [];
    for (let i = 0; i < n; i++) {
      this.nodes.push({
        x: anchorX, y: anchorY + i * segLen,
        px: anchorX, py: anchorY + i * segLen,
      });
    }
  }

  applyImpulse(impulseX) {
    const n = this.nodes.length;
    for (let i = 1; i < n; i++) {
      const t     = (i - 1) / (n - 2 || 1);
      const scale = t * t * t * t * t;
      this.nodes[i].x += impulseX * scale;
    }
  }

  step(dt) {
    const dt2 = dt * dt;
    for (let i = 1; i < this.nodes.length; i++) {
      const nd = this.nodes[i];
      const vx = (nd.x - nd.px) * DAMPING;
      const vy = (nd.y - nd.py) * DAMPING;
      nd.px = nd.x;
      nd.py = nd.y;
      nd.x += vx;
      nd.y += vy + GRAVITY_Y * dt2;
    }
    for (let iter = 0; iter < CONSTRAINT_ITER; iter++) {
      this.nodes[0].x = this.ax;
      this.nodes[0].y = this.ay;
      for (let i = 0; i < this.nodes.length - 1; i++) {
        const a = this.nodes[i], b = this.nodes[i + 1];
        const dx   = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx, dy) || 0.001;
        const diff = (dist - this.segLen) / dist;
        if (i === 0) {
          b.x -= dx * diff; b.y -= dy * diff;
        } else {
          const h = diff * 0.5;
          a.x += dx * h; a.y += dy * h;
          b.x -= dx * h; b.y -= dy * h;
        }
      }
    }
  }
}

// ─── Canvas sizing ───────────────────────────────────────────────────────────
let W, H;
let UMBRELLA_CX, UMBRELLA_CY, UMBRELLA_R;
// umbrella anchor points (bottom edge, 5 positions)
let anchorPoints = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  UMBRELLA_CX = W * 0.5;
  UMBRELLA_CY = H * 0.22;
  UMBRELLA_R  = Math.min(W, H) * 0.18;
  computeAnchorPoints();
}

function computeAnchorPoints() {
  // 5 anchor points along the bottom arc of the umbrella (180 deg spread)
  anchorPoints = [];
  const count = 5;
  for (let i = 0; i < count; i++) {
    const t   = i / (count - 1);
    const deg = 180 + t * 180; // from 180° to 360° → bottom semicircle left to right
    const rad = (deg * Math.PI) / 180;
    anchorPoints.push({
      x: UMBRELLA_CX + UMBRELLA_R * Math.cos(rad),
      y: UMBRELLA_CY + UMBRELLA_R * Math.sin(rad) * 0.45, // flattened ellipse
    });
  }
}

resize();
window.addEventListener('resize', () => { resize(); initChimes(); });

// ─── Helpers ─────────────────────────────────────────────────────────────────
const randFloat = (a, b) => Math.random() * (b - a) + a;
const randInt   = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

// ─── Shape drawing helpers ───────────────────────────────────────────────────

function drawBead(x, y, color) {
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawStar(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const outerA = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const innerA = outerA + (2 * Math.PI) / 10;
    if (i === 0) ctx.moveTo(Math.cos(outerA) * r, Math.sin(outerA) * r);
    else ctx.lineTo(Math.cos(outerA) * r, Math.sin(outerA) * r);
    ctx.lineTo(Math.cos(innerA) * (r * 0.42), Math.sin(innerA) * (r * 0.42));
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#E8C870';
  ctx.lineWidth = 0.9;
  ctx.stroke();
  ctx.restore();
}

function drawShell(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  // fan shape
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, r, -Math.PI * 0.7, Math.PI * 0.7);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#8ABCCB';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // fan lines
  ctx.strokeStyle = 'rgba(100,160,180,0.6)';
  ctx.lineWidth = 0.7;
  for (let i = -2; i <= 2; i++) {
    const a = (i / 5) * Math.PI * 0.7;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    ctx.stroke();
  }
  ctx.restore();
}

function drawFlower(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  const petalR = r * 0.48;
  const dist   = r * 0.5;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * dist, Math.sin(a) * dist, petalR, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#E8A0B8';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  // center
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = '#FFF8E0';
  ctx.fill();
  ctx.restore();
}

function drawMoon(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.arc(0, 0, r, Math.PI * 0.2, Math.PI * 1.8);
  ctx.arc(-r * 0.35, 0, r * 0.75, Math.PI * 1.75, Math.PI * 0.25, true);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#D4C070';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();
}

function drawCloud(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color;
  ctx.strokeStyle = '#A8C4D4';
  ctx.lineWidth = 0.8;
  const bumps = [
    { ox: 0,        oy: 0,      br: r * 0.55 },
    { ox: -r * 0.5, oy: r * 0.2, br: r * 0.42 },
    { ox:  r * 0.5, oy: r * 0.2, br: r * 0.42 },
    { ox: -r * 0.25, oy: r * 0.4, br: r * 0.35 },
    { ox:  r * 0.25, oy: r * 0.4, br: r * 0.35 },
  ];
  for (const b of bumps) {
    ctx.beginPath();
    ctx.arc(b.ox, b.oy, b.br, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

function drawConch(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  // outer spiral approximation with arcs
  ctx.fillStyle = color;
  ctx.strokeStyle = '#C0906A';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * 0.75, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // spiral lines
  ctx.strokeStyle = 'rgba(180,120,90,0.6)';
  ctx.lineWidth = 0.7;
  for (let i = 0; i < 3; i++) {
    const sr = r * (0.3 + i * 0.22);
    ctx.beginPath();
    ctx.arc(r * 0.08, 0, sr, Math.PI * 0.9, Math.PI * 2.2);
    ctx.stroke();
  }
  ctx.restore();
}

// item types
const ITEM_TYPES = ['star', 'shell', 'flower', 'moon', 'cloud', 'conch'];
const ITEM_COLORS = {
  star:   '#FFE4A0',
  shell:  '#B8D8E8',
  flower: '#FFD0E0',
  moon:   '#FFF0B0',
  cloud:  '#D8E8F0',
  conch:  '#E8C8B8',
};
const BEAD_COLORS = ['#FFD0E0', '#C8E0F0']; // pink, blue

function drawItem(type, x, y) {
  const r = 10;
  switch (type) {
    case 'star':   drawStar(x, y, r, ITEM_COLORS.star);   break;
    case 'shell':  drawShell(x, y, r, ITEM_COLORS.shell);  break;
    case 'flower': drawFlower(x, y, r, ITEM_COLORS.flower); break;
    case 'moon':   drawMoon(x, y, r, ITEM_COLORS.moon);   break;
    case 'cloud':  drawCloud(x, y, r * 0.9, ITEM_COLORS.cloud);  break;
    case 'conch':  drawConch(x, y, r, ITEM_COLORS.conch);  break;
  }
}

// ─── Chain draw ──────────────────────────────────────────────────────────────
Chain.prototype.draw = function() {
  const nd = this.nodes;
  // connector line
  ctx.strokeStyle = 'rgba(180,170,160,0.45)';
  ctx.lineWidth   = 0.9;
  ctx.beginPath();
  ctx.moveTo(nd[0].x, nd[0].y);
  for (let i = 1; i < nd.length; i++) ctx.lineTo(nd[i].x, nd[i].y);
  ctx.stroke();

  // items
  for (let i = 0; i < this.items.length; i++) {
    const it = this.items[i];
    const nx = nd[i + 1].x, ny = nd[i + 1].y;
    if (it.type === 'bead') {
      drawBead(nx, ny, it.color);
    } else {
      drawItem(it.type, nx, ny);
    }
  }
};

// ─── Chime collection ────────────────────────────────────────────────────────
let chimes = [];

function buildChainItems() {
  const shapeTypes = ITEM_TYPES.slice(); // all 6
  // shuffle to pick a different shape per chain
  const used = new Set();
  function pickShape() {
    let t;
    do { t = shapeTypes[randInt(0, shapeTypes.length - 1)]; } while (used.has(t));
    used.add(t);
    return t;
  }

  const configs = [];
  for (let ci = 0; ci < 5; ci++) {
    const shape = pickShape();
    const count = randInt(2, 3); // 2-3 shapes per chain
    const segLen = randFloat(32, 38);
    const items = [];
    for (let k = 0; k < count; k++) {
      // bead before each shape (except possibly before the first)
      if (k > 0) {
        items.push({ type: 'bead', color: BEAD_COLORS[k % 2] });
      }
      items.push({ type: shape });
    }
    // trailing bead
    items.push({ type: 'bead', color: BEAD_COLORS[count % 2] });
    configs.push({ items, segLen });
  }
  return configs;
}

function initChimes() {
  chimes = [];
  const configs = buildChainItems();
  for (let i = 0; i < 5; i++) {
    const ap  = anchorPoints[i];
    const cfg = configs[i];
    chimes.push({
      chain:     new Chain(ap.x, ap.y, cfg.items, cfg.segLen),
      windDelay: i * randFloat(0.04, 0.09),
    });
  }
}
initChimes();

// ─── Wind state machine (V4 exact copy) ─────────────────────────────────────
const WS = { REST: 0, BUILD: 1, BLOW: 2, DECAY: 3 };
let wState    = WS.REST;
let wTimer    = 0;
let wDir      = 1;
let wStrength = 0;
let wDur      = { rest: 2.0, build: 0.5, blow: 1.2, decay: 0.8 };

function easeIn(t)  { return t * t * t; }
function easeOut(t) { return 1 - (1 - t) ** 3; }

function startGust() {
  wState     = WS.BUILD;
  wTimer     = 0;
  wDir       = Math.random() < 0.5 ? 1 : -1;
  wDur.build = randFloat(0.3, 0.6);
  wDur.blow  = randFloat(0.8, 1.6);
  wDur.decay = randFloat(0.5, 1.0);
}

function updateWind(dt) {
  wTimer += dt;
  switch (wState) {
    case WS.REST:
      wStrength = 0;
      if (wTimer >= wDur.rest) startGust();
      break;
    case WS.BUILD:
      wStrength = easeIn(Math.min(wTimer / wDur.build, 1));
      if (wTimer >= wDur.build) { wState = WS.BLOW; wTimer = 0; }
      break;
    case WS.BLOW:
      wStrength = 0.92 + 0.08 * Math.sin(wTimer * 6.1);
      if (wTimer >= wDur.blow) { wState = WS.DECAY; wTimer = 0; }
      break;
    case WS.DECAY:
      wStrength = easeOut(1 - Math.min(wTimer / wDur.decay, 1));
      if (wTimer >= wDur.decay) {
        wStrength = 0;
        wState    = WS.REST;
        wTimer    = 0;
        wDur.rest = randFloat(1.5, 3.5);
      }
      break;
  }
}

// ─── Umbrella sway ───────────────────────────────────────────────────────────
let umbrellaAngle = 0; // radians, small tilt

function computeUmbrellaAngle() {
  // average tip offset of all chains (relative to their anchor)
  let totalOffset = 0;
  for (const { chain } of chimes) {
    const nd  = chain.nodes;
    const tip = nd[nd.length - 1];
    totalOffset += (tip.x - chain.ax);
  }
  const avg = totalOffset / chimes.length;
  // map offset to a gentle angle (about 1-2 deg max)
  const targetAngle = (avg / UMBRELLA_R) * 0.035;
  umbrellaAngle += (targetAngle - umbrellaAngle) * 0.06; // smooth
}

// ─── Draw umbrella ───────────────────────────────────────────────────────────
function drawUmbrella() {
  ctx.save();
  ctx.translate(UMBRELLA_CX, UMBRELLA_CY);
  ctx.rotate(umbrellaAngle);

  const r  = UMBRELLA_R;
  const ry = r * 0.45; // vertical radius (flattened)

  // ── cap fill ───────────────────────────────────────────────────────────────
  ctx.beginPath();
  ctx.arc(0, 0, r, Math.PI, 0);
  ctx.closePath();
  ctx.fillStyle = 'rgba(180,220,240,0.50)';
  ctx.fill();

  // ── cap outline ────────────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(130,180,210,0.8)';
  ctx.lineWidth = 1.0;
  ctx.beginPath();
  ctx.arc(0, 0, r, Math.PI, 0);
  ctx.stroke();

  // ── rib lines on cap ───────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(140,190,215,0.45)';
  ctx.lineWidth = 0.7;
  const ribCount = 6;
  for (let i = 1; i < ribCount; i++) {
    const a = Math.PI + (i / ribCount) * Math.PI;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
    ctx.stroke();
  }

  // ── wavy bottom edge ───────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(130,180,210,0.8)';
  ctx.lineWidth   = 1.0;
  ctx.beginPath();
  const waveSegs = 40;
  for (let i = 0; i <= waveSegs; i++) {
    const t  = i / waveSegs;
    const ax = -r + t * r * 2;
    // base position on flat bottom edge approximated by ellipse
    const baseY = Math.sqrt(Math.max(0, 1 - (ax / r) ** 2)) * ry;
    const waveY = baseY + Math.sin(t * Math.PI * 7) * 3.0;
    if (i === 0) ctx.moveTo(ax, waveY);
    else         ctx.lineTo(ax, waveY);
  }
  ctx.stroke();

  ctx.restore();
}

// ─── Draw bow (蝴蝶结) at top ────────────────────────────────────────────────
// 3-4 beads hang from the bow node, then the umbrella cap starts
let topBeads = [];
function initTopBeads() {
  topBeads = [];
  const colors = ['#FFD0E0', '#C8E0F0', '#FFD0E0', '#C8E0F0'];
  for (let i = 0; i < 4; i++) {
    topBeads.push({ color: colors[i], yOff: 14 + i * 10 });
  }
}
initTopBeads();

function drawBow(cx, cy) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = 'rgba(220,160,180,0.9)';
  ctx.lineWidth = 1.1;
  ctx.fillStyle = 'rgba(255,210,225,0.55)';

  // left loop
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-22, -14, -30, 5, -10, 8);
  ctx.bezierCurveTo(-4, 10, 0, 4, 0, 0);
  ctx.fill();
  ctx.stroke();

  // right loop
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(22, -14, 30, 5, 10, 8);
  ctx.bezierCurveTo(4, 10, 0, 4, 0, 0);
  ctx.fill();
  ctx.stroke();

  // left tail
  ctx.beginPath();
  ctx.moveTo(-4, 2);
  ctx.bezierCurveTo(-12, 16, -8, 22, -14, 26);
  ctx.stroke();

  // right tail
  ctx.beginPath();
  ctx.moveTo(4, 2);
  ctx.bezierCurveTo(12, 16, 8, 22, 14, 26);
  ctx.stroke();

  // knot center
  ctx.beginPath();
  ctx.arc(0, 3, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(240,180,200,0.9)';
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

// ─── Floating decorations ────────────────────────────────────────────────────
let floaters = [];
function initFloaters() {
  floaters = [];
  const count = 9;
  for (let i = 0; i < count; i++) {
    const type = Math.random() < 0.5 ? 'circle' : 'quad';
    floaters.push({
      type,
      x:    randFloat(W * 0.05, W * 0.95),
      y:    randFloat(H * 0.05, H * 0.95),
      r:    randFloat(3, 6),
      color: type === 'circle' ? 'rgba(200,180,240,0.55)' : 'rgba(180,210,240,0.55)',
      vx:   randFloat(-0.3, 0.3),
      vy:   randFloat(-0.2, 0.2),
      phase: randFloat(0, Math.PI * 2),
      freq:  randFloat(0.15, 0.35),
    });
  }
}
initFloaters();

function updateFloaters(dt, total) {
  for (const f of floaters) {
    f.x += f.vx + Math.sin(total * f.freq + f.phase) * 0.18;
    f.y += f.vy + Math.cos(total * f.freq * 1.3 + f.phase) * 0.12;
    // wrap
    if (f.x < -20)  f.x = W + 10;
    if (f.x > W + 20) f.x = -10;
    if (f.y < -20)  f.y = H + 10;
    if (f.y > H + 20) f.y = -10;
  }
}

function drawFloaters() {
  for (const f of floaters) {
    ctx.save();
    ctx.translate(f.x, f.y);
    if (f.type === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, f.r, 0, Math.PI * 2);
      ctx.strokeStyle = f.color;
      ctx.lineWidth = 1.0;
      ctx.stroke();
    } else {
      // four-pointed star
      const r1 = f.r, r2 = f.r * 0.38;
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a1 = (i / 4) * Math.PI * 2 - Math.PI / 4;
        const a2 = a1 + Math.PI / 4;
        if (i === 0) ctx.moveTo(Math.cos(a1) * r1, Math.sin(a1) * r1);
        else         ctx.lineTo(Math.cos(a1) * r1, Math.sin(a1) * r1);
        ctx.lineTo(Math.cos(a2) * r2, Math.sin(a2) * r2);
      }
      ctx.closePath();
      ctx.strokeStyle = f.color;
      ctx.lineWidth = 1.0;
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ─── Vertical string from ceiling to bow ─────────────────────────────────────
function drawHangString() {
  const bowY   = UMBRELLA_CY - UMBRELLA_R - 38;
  const stringTopY = 0;

  ctx.strokeStyle = 'rgba(180,170,155,0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(UMBRELLA_CX, stringTopY);
  ctx.lineTo(UMBRELLA_CX, bowY - 28);
  ctx.stroke();

  // beads on the short section below the bow
  const beadStartY = bowY + 30;
  for (let i = 0; i < topBeads.length; i++) {
    const b  = topBeads[i];
    const by = beadStartY + i * 11;
    drawBead(UMBRELLA_CX, by, b.color);
  }
  // line connecting beads to umbrella top
  ctx.strokeStyle = 'rgba(180,170,155,0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(UMBRELLA_CX, beadStartY - 2);
  ctx.lineTo(UMBRELLA_CX, UMBRELLA_CY - UMBRELLA_R + 2);
  ctx.stroke();
}

// ─── Main loop ───────────────────────────────────────────────────────────────
let lastTime  = null;
let totalTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = ts; return; }
  const dt  = Math.min((ts - lastTime) / 1000, 0.04);
  lastTime  = ts;
  totalTime += dt;

  updateWind(dt);
  updateFloaters(dt, totalTime);
  computeUmbrellaAngle();

  // ── Apply forces to each chain (V4 exact logic) ──────────────────────────
  for (let ci = 0; ci < chimes.length; ci++) {
    const { chain, windDelay } = chimes[ci];
    const breath = Math.sin(totalTime * chain.breathFreq * Math.PI * 2 + chain.breathPhase);
    chain.applyImpulse(breath * SWAY_BASE_IMPULSE);

    if (wStrength > 0) {
      const elapsed = wTimer - windDelay;
      if (elapsed > 0) {
        const gustEnv = Math.min(elapsed / 0.15, 1.0);
        const impulse = wDir * wStrength * gustEnv * WIND_MAX_IMPULSE;
        chain.applyImpulse(impulse);
      }
    }
    chain.step(dt);
  }

  // ── Render ───────────────────────────────────────────────────────────────
  ctx.fillStyle = '#FFFFF8';
  ctx.fillRect(0, 0, W, H);

  drawFloaters();
  drawHangString();

  const bowY = UMBRELLA_CY - UMBRELLA_R - 38;
  drawBow(UMBRELLA_CX, bowY);

  drawUmbrella();

  // small dots at anchor points for visual connection
  for (const ap of anchorPoints) {
    // anchor dot (rotate with umbrella)
    const dx = ap.x - UMBRELLA_CX, dy = ap.y - UMBRELLA_CY;
    const cosA = Math.cos(umbrellaAngle), sinA = Math.sin(umbrellaAngle);
    const rx = cosA * dx - sinA * dy + UMBRELLA_CX;
    const ry = sinA * dx + cosA * dy + UMBRELLA_CY;
    drawBead(rx, ry, 'rgba(160,200,220,0.7)');
  }

  for (const { chain } of chimes) {
    chain.draw();
  }
}

requestAnimationFrame(loop);
</script>
</body>
