<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparkler Letters Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f7;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 600;
const H = 700;
canvas.width = W;
canvas.height = H;

// Sparkler stick: from bottom-center-left upward, slightly tilted
// Base point (bottom of stick), tip point (top of stick)
const STICK_BASE = { x: W * 0.42, y: H * 0.92 };
const STICK_TIP  = { x: W * 0.52, y: H * 0.28 };

// Colors
const LETTER_COLORS = ['#FF6B2B', '#4A9EFF', '#FF4DA6', '#5FD068', '#B8E000', '#FFD700', '#FF8C42'];
const DOT_COLORS    = ['#FF4DA6', '#4A9EFF', '#FFD700', '#5FD068', '#FF6B2B'];
const LETTERS       = 'EKZJMTBRVLSWPQY'.split('');

// Stick dots (decorative dots on the stick body)
const NUM_DOTS = 14;

// Letter particles
const letters = [];

// Timing
let lastTime = 0;
let spawnInterval = 0; // ms between spawns
const SPAWN_RATE = 110; // ms
let spawnAccum = 0;

// Precompute stick direction
const stickDX = STICK_TIP.x - STICK_BASE.x;
const stickDY = STICK_TIP.y - STICK_BASE.y;
const stickLen = Math.sqrt(stickDX * stickDX + stickDY * stickDY);
const stickAngle = Math.atan2(stickDY, stickDX); // angle of stick

// Spawn a letter from the tip
function spawnLetter() {
  // Fan angle: upward, about 120 degrees centered around upward direction
  // Upward from tip is roughly -PI/2 but we tilt relative to stick normal
  // Tip points upward-right, so "upward fan" centered ~90deg above horizontal
  const fanCenter = -Math.PI / 2 + 0.15; // slightly tilted right
  const fanSpread = (Math.PI * 2) / 3;   // 120 degrees
  const angle = fanCenter + (Math.random() - 0.5) * fanSpread;

  const speed = 180 + Math.random() * 140; // px/s
  const color = LETTER_COLORS[Math.floor(Math.random() * LETTER_COLORS.length)];
  const letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
  const size = 22 + Math.floor(Math.random() * 16);

  letters.push({
    x: STICK_TIP.x + (Math.random() - 0.5) * 10,
    y: STICK_TIP.y + (Math.random() - 0.5) * 8,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    color,
    letter,
    size,
    alpha: 1,
    trail: [], // store past positions for trail
    age: 0,
    lifespan: 0.9 + Math.random() * 0.5,
    dead: false,
  });
}

// Draw decorative dots on stick body
function drawStickDots() {
  for (let i = 0; i < NUM_DOTS; i++) {
    const t = (i + 1) / (NUM_DOTS + 1);
    const x = STICK_BASE.x + stickDX * t;
    const y = STICK_BASE.y + stickDY * t;
    const color = DOT_COLORS[i % DOT_COLORS.length];
    const r = 4 + Math.sin(i * 1.3) * 1.5;

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }
}

// Draw the sparkler stick
function drawStick() {
  // Glow layer
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineWidth = 18;
  ctx.strokeStyle = 'rgba(255, 100, 180, 0.18)';
  ctx.beginPath();
  ctx.moveTo(STICK_BASE.x, STICK_BASE.y);
  ctx.lineTo(STICK_TIP.x, STICK_TIP.y);
  ctx.stroke();

  // Core
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#FF4DA6';
  ctx.shadowColor = '#FF4DA6';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(STICK_BASE.x, STICK_BASE.y);
  ctx.lineTo(STICK_TIP.x, STICK_TIP.y);
  ctx.stroke();

  // Bright center
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#FFB3D9';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(STICK_BASE.x, STICK_BASE.y);
  ctx.lineTo(STICK_TIP.x, STICK_TIP.y);
  ctx.stroke();

  ctx.restore();
}

// Draw glowing tip
function drawTip(t) {
  const pulse = 0.7 + 0.3 * Math.sin(t * 8);
  ctx.save();
  ctx.shadowColor = '#FFF';
  ctx.shadowBlur = 24 * pulse;

  // Outer glow
  const grad = ctx.createRadialGradient(STICK_TIP.x, STICK_TIP.y, 0, STICK_TIP.x, STICK_TIP.y, 22 * pulse);
  grad.addColorStop(0, 'rgba(255,255,255,0.95)');
  grad.addColorStop(0.3, 'rgba(255,200,100,0.7)');
  grad.addColorStop(1, 'rgba(255,150,80,0)');
  ctx.beginPath();
  ctx.arc(STICK_TIP.x, STICK_TIP.y, 22 * pulse, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function update(dt, t) {
  // Spawn new letters
  spawnAccum += dt * 1000;
  while (spawnAccum >= SPAWN_RATE) {
    spawnLetter();
    spawnAccum -= SPAWN_RATE;
  }

  for (const p of letters) {
    if (p.dead) continue;

    // Store trail point
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 12) p.trail.shift();

    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.age += dt;

    // Fade out near end of life
    const lifeRatio = p.age / p.lifespan;
    p.alpha = lifeRatio < 0.6 ? 1 : 1 - (lifeRatio - 0.6) / 0.4;

    if (p.age >= p.lifespan || p.alpha <= 0) {
      p.dead = true;
    }
  }

  // Remove dead letters
  for (let i = letters.length - 1; i >= 0; i--) {
    if (letters[i].dead) letters.splice(i, 1);
  }
}

function drawLetters() {
  for (const p of letters) {
    if (p.dead) continue;

    ctx.save();
    ctx.globalAlpha = p.alpha;

    // Draw trail as a straight line from origin of trail to current
    if (p.trail.length >= 2) {
      const start = p.trail[0];
      ctx.beginPath();
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = p.alpha * 0.65;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.globalAlpha = p.alpha;
    }

    // Draw letter with glow
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.font = `bold ${p.size}px "Arial Black", Arial, sans-serif`;
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.letter, p.x, p.y);

    ctx.restore();
  }
}

function render(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  const t = timestamp / 1000;

  // Clear
  ctx.clearRect(0, 0, W, H);

  update(dt, t);

  drawLetters();
  drawStick();
  drawStickDots();
  drawTip(t);

  requestAnimationFrame(render);
}

requestAnimationFrame((ts) => {
  lastTime = ts;
  render(ts);
});
</script>
</body>
</html>
