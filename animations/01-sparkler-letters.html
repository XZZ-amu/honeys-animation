<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkler Letters</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  // Warm romantic colors: pink, gold, warm orange
  const colors = [
    '#FFD700', // gold
    '#FFA500', // orange
    '#FF8C00', // dark orange
    '#FF69B4', // hot pink
    '#FFB6C1', // light pink
    '#FF6347', // tomato / warm red
    '#FFDA63', // soft gold
    '#FFC0CB', // pink
    '#FF4500', // orange red
    '#FFE4B5', // moccasin / pale gold
  ];

  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';

  let particles = [];
  let lastSpawnTime = 0;

  // Spawn 20-30 letters per second → interval 33-50ms
  // We'll spawn 1-2 per frame target, controlled by time
  const SPAWN_INTERVAL = 40; // ms between spawns → 25/sec avg

  function randomLetter() {
    return letters[Math.floor(Math.random() * letters.length)];
  }

  function randomColor() {
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function spawnParticle(cx, cy) {
    // Random direction: full 360°
    const angle = Math.random() * Math.PI * 2;
    // Speed: main velocity + slight randomness
    const speed = 1.5 + Math.random() * 3.5;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed;

    // Slight initial jitter so it looks like it's emitting from a small bright area
    const jitter = 4;
    const x = cx + (Math.random() - 0.5) * jitter;
    const y = cy + (Math.random() - 0.5) * jitter;

    particles.push({
      x,
      y,
      vx,
      vy,
      letter: randomLetter(),
      color: randomColor(),
      size: 10 + Math.random() * 10,       // initial font size px
      alpha: 1,
      life: 0,
      maxLife: 60 + Math.random() * 80,    // frames alive (1-2.3 sec at 60fps)
      rotation: (Math.random() - 0.5) * 0.4,
      rotationSpeed: (Math.random() - 0.5) * 0.08,
    });
  }

  // Glow layers for center point
  function drawCenter(cx, cy, time) {
    const pulse = 0.85 + 0.15 * Math.sin(time * 0.005);

    // Outer glow
    const gradOuter = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50 * pulse);
    gradOuter.addColorStop(0, 'rgba(255, 210, 80, 0.35)');
    gradOuter.addColorStop(0.5, 'rgba(255, 140, 0, 0.12)');
    gradOuter.addColorStop(1, 'rgba(255, 100, 0, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, 50 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = gradOuter;
    ctx.fill();

    // Mid glow
    const gradMid = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18 * pulse);
    gradMid.addColorStop(0, 'rgba(255, 240, 160, 0.9)');
    gradMid.addColorStop(0.6, 'rgba(255, 190, 40, 0.5)');
    gradMid.addColorStop(1, 'rgba(255, 140, 0, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, 18 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = gradMid;
    ctx.fill();

    // Bright core
    const gradCore = ctx.createRadialGradient(cx, cy, 0, cx, cy, 6);
    gradCore.addColorStop(0, 'rgba(255, 255, 220, 1)');
    gradCore.addColorStop(0.5, 'rgba(255, 220, 80, 0.9)');
    gradCore.addColorStop(1, 'rgba(255, 180, 0, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = gradCore;
    ctx.fill();
  }

  let lastTime = 0;

  function animate(timestamp) {
    requestAnimationFrame(animate);

    const dt = timestamp - lastTime;
    lastTime = timestamp;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // Clear with full black (no trail effect — letters fade via alpha)
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Spawn new particles
    if (timestamp - lastSpawnTime > SPAWN_INTERVAL) {
      // Spawn 1-2 at a time for slight burst feel
      const count = Math.random() < 0.4 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        spawnParticle(cx, cy);
      }
      lastSpawnTime = timestamp;
    }

    // Update and draw particles
    ctx.save();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++;

      const progress = p.life / p.maxLife; // 0 → 1

      // Fade: quick ramp in, long fade out
      if (progress < 0.1) {
        p.alpha = progress / 0.1;
      } else {
        p.alpha = 1 - ((progress - 0.1) / 0.9);
      }

      // Shrink over lifetime
      const currentSize = p.size * (1 - progress * 0.7);

      // Slight gravity / drift
      p.vy += 0.015;
      p.vx *= 0.995;
      p.vy *= 0.995;

      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.rotationSpeed;

      if (p.life >= p.maxLife) {
        particles.splice(i, 1);
        continue;
      }

      // Draw letter
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.font = `bold ${currentSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Soft glow shadow on each letter
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8 * p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillText(p.letter, 0, 0);

      ctx.restore();
    }
    ctx.restore();

    // Draw center sparkle on top
    drawCenter(cx, cy, timestamp);
  }

  requestAnimationFrame(animate);
</script>
</body>
</html>
