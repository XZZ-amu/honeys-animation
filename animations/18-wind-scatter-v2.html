<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Scatter v2 – ByteDance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #C8BFA8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #notebook {
    position: relative;
    width: 720px;
    height: 448px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.22), 0 1px 4px rgba(0,0,0,0.12);
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    display: block;
  }
</style>
</head>
<body>
<div id="notebook">
  <canvas id="c" width="720" height="448"></canvas>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const W = 720, H = 448;
const LINE_SPACING = 32;
const MARGIN_LEFT  = 60;
const MARGIN_TOP   = 20;
const PAPER_COLOR  = '#FDF8E8';
const LINE_COLOR   = 'rgba(100,150,200,0.3)';
const RED_LINE_X   = 60;
const RED_LINE     = 'rgba(200,100,100,0.3)';
const INK          = '#2C3E50';
const BD_COLOR     = '#4169E1';
const FONT_SIZE    = 19;
const FONT         = `${FONT_SIZE}px 'Segoe Script','Caveat','Comic Sans MS',cursive`;

// Timeline (seconds)
const T_STATIC     = 1.5;   // 0 → 1.5  pure static
const T_OMEN_END   = 2.0;   // 1.5 → 2.0  all-text premonition lean
const T_SCATTER_END= 6.0;   // 2.0 → 6.0  letters fly away
const T_REVEAL_END = 7.5;   // 6.0 → 7.5  ByteDance color shift
const T_FADE_START = 8.0;
const T_FADE_END   = 9.0;
const CYCLE        = 9.0;

// ─── Text lines (7 lines; ByteDance in line index 3) ─────────────────────────
const LINES = [
  "Every morning the quiet hum of servers fills the air,",
  "packets traveling across invisible highways of light.",
  "Somewhere a function returns, a promise resolves,",
  "and the ByteDance dream pulses through the network.",
  "Engineers weave logic into elegant tapestries of code,",
  "each commit a small step toward something larger.",
  "The cursor blinks, patient as ever, waiting.",
];
const BD_WORD = "ByteDance";
const BD_LINE = 3;

// ─── Canvas & context ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ─── Color helpers ────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function lerpColor(a, b, t) {
  const [r1,g1,b1] = hexToRgb(a), [r2,g2,b2] = hexToRgb(b);
  t = Math.max(0, Math.min(1, t));
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ─── Measure all letter positions ────────────────────────────────────────────
let letters = [];   // { ch, x, y, w, isBD, row, col, edginess, sparseness }

function measureLetters() {
  ctx.font = FONT;
  ctx.textBaseline = 'alphabetic';
  letters = [];

  LINES.forEach((line, row) => {
    const baseY = MARGIN_TOP + (row + 1) * LINE_SPACING;
    let curX = MARGIN_LEFT + 8;
    const bdStart = line.indexOf(BD_WORD);
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      const w  = ctx.measureText(ch).width;
      const isBD = (row === BD_LINE) && bdStart !== -1 && col >= bdStart && col < bdStart + BD_WORD.length;

      // "grip" factors: higher = harder to blow away
      // edginess: chars near line edges are easier to blow
      const lineW = ctx.measureText(line).width;
      const posInLine = (curX - MARGIN_LEFT) / lineW;
      const edginess = posInLine > 0.5 ? posInLine : (1 - posInLine); // 0=center, 1=edge
      // sparseness: simple chars (space, comma, period) are lighter
      const sparse = /[.,!?; ]/.test(ch) ? 1 : 0;

      letters.push({ ch, x: curX, y: baseY, w, isBD, row, col, edginess, sparse });
      curX += w;
    }
  });
}

// ─── Wind burst schedule ──────────────────────────────────────────────────────
// Three "gusts" during scatter phase: weak, medium, strong
// Each gust releases a batch of letters
// gust = { time, strength }   strength 0..1
const GUSTS = [
  { time: 2.0, strength: 0.15 },   // first tendrils
  { time: 2.7, strength: 0.30 },
  { time: 3.3, strength: 0.45 },
  { time: 3.9, strength: 0.70 },
  { time: 4.4, strength: 0.85 },
  { time: 4.9, strength: 1.00 },   // final sweep
];

// ─── Assign departure delays ──────────────────────────────────────────────────
// Each non-BD letter is assigned a departure time based on:
//   - edginess (higher = departs earlier)
//   - sparse (punctuation/spaces depart earlier)
//   - small random noise
//   - slight left-to-right bias (wind arrives left first)
// Returns array of { letterIndex, departureTime }
function buildSchedule(nonBDLetters) {
  // score: lower score = departs earlier
  const scored = nonBDLetters.map((l, i) => {
    const leftBias = (l.x - MARGIN_LEFT) / (W - MARGIN_LEFT); // 0=left, 1=right
    const grip = (1 - l.edginess) * 0.5 + (l.sparse ? 0 : 0.3) + leftBias * 0.2;
    // grip ~0..1, lower = weaker grip = flies sooner
    const score = grip + Math.random() * 0.3;
    return { idx: i, score, letter: l };
  });
  scored.sort((a, b) => a.score - b.score);

  // Map sorted order to departure times
  // distribute across scatter phase with gust rhythm
  const n = scored.length;
  const result = new Array(n);
  scored.forEach((item, rank) => {
    const frac = rank / (n - 1);  // 0..1
    // distribute with acceleration: early letters are sparse, late letters dense
    // use sqrt to push more letters to the end (big final rush)
    const tFrac = Math.pow(frac, 0.7);
    const base = T_OMEN_END + tFrac * (T_SCATTER_END - T_OMEN_END - 1.0);
    // Add gust "snapping": snap to nearest gust ± small random window
    const snap = gustSnap(base);
    result[item.idx] = snap;
  });
  return result;
}

function gustSnap(t) {
  // Find nearest gust and pull toward it slightly
  let nearest = GUSTS[0], minD = Infinity;
  for (const g of GUSTS) {
    const d = Math.abs(g.time - t);
    if (d < minD) { minD = d; nearest = g; }
  }
  // Blend: 40% snap to gust, 60% original time
  const snapped = nearest.time + (Math.random() - 0.5) * 0.35;
  return 0.4 * snapped + 0.6 * t;
}

// ─── FloatingLetter class ─────────────────────────────────────────────────────
class FloatingLetter {
  constructor(letter, departureTime) {
    this.l      = letter;
    this.depT   = departureTime;
    this.phase  = 'static';   // static | pulling | flying | gone

    // pulling phase: letter gets tugged back and forth before releasing
    this.pullT   = 0;
    this.pullDur = 0.18 + Math.random() * 0.14;  // 0.18–0.32s

    // flight physics
    this.fx = letter.x;
    this.fy = letter.y;

    // Direction: mostly right + upward. Angle between -20° and -40° from horizontal
    const angleDeg = -(20 + Math.random() * 25);
    const angleRad = angleDeg * Math.PI / 180;
    const speed    = 40 + Math.random() * 55;  // px/s initial
    this.vx = Math.cos(angleRad) * speed;
    this.vy = Math.sin(angleRad) * speed;

    // Acceleration (wind pushes harder over time)
    this.ax = 60 + Math.random() * 40;   // rightward push
    this.ay = -8 + Math.random() * 6;    // mild upward

    this.drag   = 0.980 + Math.random() * 0.008;

    // Sway: sinusoidal lateral wobble (tumbling in wind)
    this.swayAmp   = 18 + Math.random() * 22;
    this.swayFreq  = 0.4 + Math.random() * 0.5;
    this.swayPhase = Math.random() * Math.PI * 2;

    // Rotation
    this.rot      = 0;
    this.rotSpeed = (Math.random() - 0.5) * 2.2;

    // Scale (shrink as it flies away for depth)
    this.scale = 1;

    // Alpha
    this.alpha   = 1;
    this.flyT    = 0;
    this.flyDur  = 2.0 + Math.random() * 1.0;

    // pull offset
    this.pullOffset = 0;
  }

  update(dt, cycleTime) {
    if (this.phase === 'gone') return;

    if (this.phase === 'static') {
      if (cycleTime >= this.depT) {
        this.phase = 'pulling';
        this.pullT = 0;
      }
      return;
    }

    if (this.phase === 'pulling') {
      this.pullT += dt;
      const t = this.pullT / this.pullDur;
      // Letter gets pulled rightward in increasing jerks:
      // - 0–33%: snap right (+4px), back to 0
      // - 33–66%: snap right more (+7px), back to 0
      // - 66–100%: snap right hard (+10px) and hold → release into flying
      // Achieved with an envelope of sin pulses biased positive
      const jerk = Math.abs(Math.sin(t * Math.PI * 3)) * t * 10;
      // Bias the jerk rightward (no leftward component)
      this.pullOffset = jerk;
      if (this.pullT >= this.pullDur) {
        this.phase = 'flying';
        this.pullOffset = 0;
        this.fx = this.l.x;
        this.fy = this.l.y;
      }
      return;
    }

    if (this.phase === 'flying') {
      this.flyT += dt;

      // Accelerate over first 0.5s
      const accelPhase = Math.min(this.flyT / 0.5, 1);
      const ax = this.ax * accelPhase;

      // Physics
      this.vx += ax * dt;
      this.vy += this.ay * dt;
      this.vx *= this.drag;
      this.vy *= this.drag;

      // Sway (lateral tumbling perpendicular to main motion)
      const swayMag = this.swayAmp * Math.sin(this.swayFreq * this.flyT * Math.PI * 2 + this.swayPhase);
      // Sway is mostly vertical (letter bobs up/down as it flies right)
      const swayVY = swayMag * 25;

      this.fx += this.vx * dt;
      this.fy += (this.vy + swayVY * dt) * dt;

      this.rot   += this.rotSpeed * dt;

      // Scale: shrink slightly as it flies far
      this.scale = Math.max(0.3, 1 - this.flyT * 0.15);

      // Fade: start fading at 60% of flight
      const fadeStart = this.flyDur * 0.58;
      if (this.flyT > fadeStart) {
        this.alpha = 1 - (this.flyT - fadeStart) / (this.flyDur - fadeStart);
      }

      if (this.flyT >= this.flyDur || this.alpha <= 0 || this.fx > W + 100) {
        this.phase = 'gone';
      }
    }
  }

  draw(ctx) {
    if (this.phase === 'gone') return;
    ctx.save();
    ctx.font = FONT;
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = INK;

    if (this.phase === 'static') {
      ctx.fillText(this.l.ch, this.l.x, this.l.y);
    } else if (this.phase === 'pulling') {
      ctx.fillText(this.l.ch, this.l.x + this.pullOffset, this.l.y);
    } else if (this.phase === 'flying') {
      ctx.globalAlpha = Math.max(0, this.alpha);
      const cx = this.fx + this.l.w / 2;
      const cy = this.fy - FONT_SIZE * 0.45;
      ctx.translate(cx, cy);
      ctx.rotate(this.rot);
      ctx.scale(this.scale, this.scale);
      ctx.fillText(this.l.ch, -this.l.w / 2, FONT_SIZE * 0.45);
    }
    ctx.restore();
  }
}

// ─── StableLetter (ByteDance) ─────────────────────────────────────────────────
class StableLetter {
  constructor(letter) {
    this.l         = letter;
    this.wobbled   = false;
    this.wobbleT   = 0;
    this.wobbleDur = 0.25;
    this.offset    = 0;
    // Wind arrives at this letter's position at around T_OMEN_END
    // (slight left-to-right delay across BD word)
    const relX = (letter.x - MARGIN_LEFT) / (W - MARGIN_LEFT);
    this.windArrival = T_OMEN_END + relX * 0.15;
  }

  update(dt, cycleTime) {
    if (!this.wobbled && cycleTime >= this.windArrival) {
      this.wobbled = true;
      this.wobbleT = 0;
    }
    if (this.wobbled && this.wobbleT < this.wobbleDur) {
      this.wobbleT += dt;
      const t = this.wobbleT / this.wobbleDur;
      // tiny rightward nudge then return — very subtle
      this.offset = Math.sin(t * Math.PI * 5) * 1.5 * (1 - t);
    } else {
      this.offset = 0;
    }
  }

  draw(ctx, colorProgress) {
    ctx.save();
    ctx.font = FONT;
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle   = lerpColor(INK, BD_COLOR, colorProgress);
    ctx.globalAlpha = 1;
    ctx.fillText(this.l.ch, this.l.x + this.offset, this.l.y);
    ctx.restore();
  }
}

// ─── Build particle lists ─────────────────────────────────────────────────────
let floaters = [];
let stables  = [];

function buildParticles() {
  measureLetters();
  floaters = [];
  stables  = [];

  const nonBD = letters.filter(l => !l.isBD);
  const departures = buildSchedule(nonBD);

  nonBD.forEach((l, i) => {
    floaters.push(new FloatingLetter(l, departures[i]));
  });

  letters.filter(l => l.isBD).forEach(l => {
    stables.push(new StableLetter(l));
  });
}

// ─── Draw notebook background ─────────────────────────────────────────────────
function drawNotebook() {
  ctx.fillStyle = PAPER_COLOR;
  ctx.fillRect(0, 0, W, H);

  // Horizontal lines
  ctx.strokeStyle = LINE_COLOR;
  ctx.lineWidth   = 1;
  for (let y = MARGIN_TOP + LINE_SPACING; y < H - 8; y += LINE_SPACING) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Left red margin
  ctx.strokeStyle = RED_LINE;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(RED_LINE_X, 0);
  ctx.lineTo(RED_LINE_X, H);
  ctx.stroke();
}

// ─── Global premonition effect ────────────────────────────────────────────────
// When wind arrives (1.5–2s), all static letters tilt slightly right
// Returns lean offset (pixels) based on cycle time
function leanOffset(cycleTime) {
  if (cycleTime < T_STATIC) return 0;
  if (cycleTime >= T_OMEN_END) return 0;
  const t = (cycleTime - T_STATIC) / (T_OMEN_END - T_STATIC); // 0..1
  // Ramp up fast then ease out — like a gust of air that builds and then settles
  // easeInQuad shape: fast rise, slow return
  const lean = t < 0.6
    ? (t / 0.6) * 3.0                               // ramp up to 3px rightward
    : 3.0 * (1 - (t - 0.6) / 0.4);                 // ramp back down
  // High-frequency tremor that fades out
  const tremor = Math.sin(t * Math.PI * 28) * 0.9 * (1 - t);
  return lean + tremor;
}

// ─── Main animation loop ──────────────────────────────────────────────────────
let cycleTime = 0;
let lastTS    = null;
let pageAlpha = 1;

function tick(ts) {
  if (!lastTS) lastTS = ts;
  const rawDt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS = ts;
  cycleTime += rawDt;

  // Reset
  if (cycleTime >= CYCLE) {
    cycleTime -= CYCLE;
    buildParticles();
  }

  // Page alpha (fade in at cycle start, fade out at end)
  if (cycleTime < 0.35) {
    pageAlpha = cycleTime / 0.35;
  } else if (cycleTime < T_FADE_START) {
    pageAlpha = 1;
  } else if (cycleTime < T_FADE_END) {
    pageAlpha = 1 - (cycleTime - T_FADE_START) / (T_FADE_END - T_FADE_START);
  } else {
    pageAlpha = 0;
  }

  // Update particles (only during scatter + reveal phases)
  const dt = (cycleTime >= T_STATIC) ? rawDt : 0;
  floaters.forEach(f => f.update(dt, cycleTime));
  stables.forEach(s => s.update(dt, cycleTime));

  // ByteDance color reveal progress
  let colorP = 0;
  if (cycleTime >= T_SCATTER_END && cycleTime < T_REVEAL_END) {
    colorP = (cycleTime - T_SCATTER_END) / (T_REVEAL_END - T_SCATTER_END);
  } else if (cycleTime >= T_REVEAL_END) {
    colorP = 1;
  }

  // ── Draw ─────────────────────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.globalAlpha = pageAlpha;

  drawNotebook();

  if (cycleTime < T_STATIC) {
    // Pure static: draw everything at rest
    ctx.font = FONT;
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = INK;
    letters.forEach(l => ctx.fillText(l.ch, l.x, l.y));

  } else if (cycleTime < T_OMEN_END) {
    // Premonition: all text leans slightly right + trembles
    const lean = leanOffset(cycleTime);
    ctx.font = FONT;
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = INK;
    // Draw all non-BD letters with lean
    floaters.forEach(f => ctx.fillText(f.l.ch, f.l.x + lean, f.l.y));
    // ByteDance gets only a tiny fraction of the lean (it's anchored)
    stables.forEach(s => ctx.fillText(s.l.ch, s.l.x + lean * 0.15, s.l.y));

  } else {
    // Scatter + reveal phases
    // Draw floaters (they manage own phases internally)
    floaters.forEach(f => f.draw(ctx));
    // Draw ByteDance
    stables.forEach(s => s.draw(ctx, colorP));
  }

  ctx.restore();
  requestAnimationFrame(tick);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
buildParticles();
requestAnimationFrame(tick);
</script>
</body>
</html>
