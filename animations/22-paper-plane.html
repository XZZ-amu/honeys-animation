<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Plane</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #1565C0;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Letter Paper ──────────────────────────────────────────────
const PAPER = {
  w: 200,
  h: 350,
  get x() { return canvas.width * 0.32 - this.w / 2; },
  get y() { return canvas.height / 2 - this.h / 2; }
};

const COLUMNS = [
  '寄書長不達，況乃未休兵',
  '烽火連三月，家書抵萬金',
  '春望感時花濺淚，恨別鳥驚心',
  '白頭搔更短，渾欲不勝簪',
  '獨在異鄉為異客',
  '每逢佳節倍思親',
];

function drawPaper() {
  const { x, y, w, h } = PAPER;

  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 18;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 6;

  // White background
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 4);
  ctx.fill();
  ctx.restore();

  // Vertical ruling lines (traditional letter paper)
  const lineSpacing = 28;
  const lineCount = Math.floor(w / lineSpacing);
  ctx.save();
  ctx.strokeStyle = 'rgba(180,180,180,0.45)';
  ctx.lineWidth = 0.8;
  for (let i = 1; i < lineCount; i++) {
    const lx = x + i * lineSpacing;
    ctx.beginPath();
    ctx.moveTo(lx, y + 12);
    ctx.lineTo(lx, y + h - 12);
    ctx.stroke();
  }
  ctx.restore();

  // Top/bottom border lines
  ctx.save();
  ctx.strokeStyle = 'rgba(200,180,160,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 10, y + 12); ctx.lineTo(x + w - 10, y + 12);
  ctx.moveTo(x + 10, y + h - 12); ctx.lineTo(x + w - 10, y + h - 12);
  ctx.stroke();
  ctx.restore();

  // Vertical text — right to left, top to bottom per column
  ctx.save();
  ctx.font = '15px "Songti SC", "SimSun", "STSong", serif';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  const colWidth = lineSpacing;
  const startX = x + w - 18; // rightmost column x
  const textTop = y + 20;
  const charH = 19;
  const maxCharsPerCol = Math.floor((h - 40) / charH);

  COLUMNS.forEach((col, ci) => {
    const cx = startX - ci * colWidth;
    if (cx < x + 6) return; // don't overflow left
    const chars = col.split('');
    chars.slice(0, maxCharsPerCol).forEach((ch, ri) => {
      ctx.fillText(ch, cx, textTop + ri * charH);
    });
  });

  ctx.restore();
}

// ── Paper Plane ───────────────────────────────────────────────
// Plane SVG-style shape: classic folded paper plane, side view
function drawPlane(cx, cy, scale = 1) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // Body — main triangle pointing right
  ctx.beginPath();
  ctx.moveTo(20, 0);      // nose tip (right)
  ctx.lineTo(-16, -10);   // top rear
  ctx.lineTo(-10, 0);     // fuselage indent
  ctx.lineTo(-16, 10);    // bottom rear
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(220,220,220,0.6)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Wing fold line
  ctx.beginPath();
  ctx.moveTo(20, 0);
  ctx.lineTo(-10, 0);
  ctx.strokeStyle = 'rgba(180,180,180,0.7)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

// ── Trail ─────────────────────────────────────────────────────
const TRAIL_MAX = 120;
const trail = [];

function addTrailPoint(x, y) {
  trail.push({ x, y });
  while (trail.length > TRAIL_MAX) trail.shift();
}

function drawTrail() {
  if (trail.length < 2) return;
  ctx.save();
  for (let i = 1; i < trail.length; i++) {
    const alpha = (i / trail.length) * 0.45;
    const width = (i / trail.length) * 1.4;
    ctx.beginPath();
    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  ctx.restore();
}

// ── Animation state ───────────────────────────────────────────
const DURATION = 5.5;   // seconds for one pass
const OSC_AMP  = 5;     // px oscillation amplitude
const OSC_FREQ = 1.5;   // Hz

let startTime = null;

function getPlanePos(t) {
  // t in [0,1]: normalized progress across screen
  const W = canvas.width;
  const H = canvas.height;

  const x = -40 + t * (W + 80); // -40 to W+40

  // Baseline arc: from y=55% to y=30%
  const yBase = H * (0.55 - t * 0.25);

  // Oscillation on top
  const osc = Math.sin(t * DURATION * OSC_FREQ * Math.PI * 2) * OSC_AMP;

  return { x, y: yBase + osc };
}

// ── Main loop ─────────────────────────────────────────────────
function frame(ts) {
  if (!startTime) startTime = ts;

  const elapsed = (ts - startTime) / 1000;
  const t = (elapsed % DURATION) / DURATION;

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Letter paper
  drawPaper();

  // Trail
  const { x: px, y: py } = getPlanePos(t);

  // Reset trail on loop start
  if (t < 0.01 && trail.length > 20) trail.length = 0;

  addTrailPoint(px, py);
  drawTrail();

  // Plane — slight nose-up tilt based on vertical velocity
  const tNext = Math.min(t + 0.002, 1);
  const { y: pyNext } = getPlanePos(tNext);
  const angle = Math.atan2(pyNext - py, canvas.width * 0.002);

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);
  drawPlane(0, 0, 1);
  ctx.restore();

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
