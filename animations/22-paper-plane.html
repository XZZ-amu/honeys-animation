<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Dissolve</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1565C0; width: 100vw; height: 100vh; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;

const CYCLE = 7;
const NUM_PARTICLES = 175;

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t) { return 1 - (1-t)*(1-t); }

let particles = [];

function getPaperRect() {
  const cx = W * 0.36;
  const cy = H * 0.5;
  const pw = 200, ph = 350;
  return { x: cx - pw/2, y: cy - ph/2, w: pw, h: ph };
}

// Quadratic bezier arc for particle cloud: center-mid to top-right
function getArcPoint(t) {
  const x0 = W * 0.52, y0 = H * 0.62;
  const x1 = W * 0.92, y1 = H * 0.08;
  const cx = W * 0.78, cy = H * 0.18;
  const mt = 1 - t;
  return {
    x: mt*mt*x0 + 2*mt*t*cx + t*t*x1,
    y: mt*mt*y0 + 2*mt*t*cy + t*t*y1
  };
}

function getArcNormal(t) {
  const eps = 0.01;
  const p0 = getArcPoint(Math.max(0, t - eps));
  const p1 = getArcPoint(Math.min(1, t + eps));
  const dx = p1.x - p0.x, dy = p1.y - p0.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  return { nx: -dy/len, ny: dx/len };
}

function init() {
  if (!W || !H) return;
  particles = [];
  const pr = getPaperRect();

  for (let i = 0; i < NUM_PARTICLES; i++) {
    // Birth position: distributed across paper area
    const bx = pr.x + 15 + Math.random() * (pr.w - 30);
    const by = pr.y + 20 + Math.random() * (pr.h - 40);

    // Target position: along the arc with perpendicular spread
    const arcT = Math.random();
    const ap = getArcPoint(arcT);
    const an = getArcNormal(arcT);
    const spread = (Math.random() - 0.5) * 110;
    const tx = ap.x + an.nx * spread;
    const ty = ap.y + an.ny * spread;

    const rx = 5 + Math.random() * 5;
    const ry = 3 + Math.random() * 3;

    // Dissolve timing: right-top dissolves first
    const normRight = (bx - pr.x) / pr.w;
    const normTop = 1 - (by - pr.y) / pr.h;
    const dissolveScore = normRight * 0.6 + normTop * 0.4;
    // birthStart in normalized cycle time: t=1/7 to t=4/7
    const birthStart = 1/7 + (1 - dissolveScore) * (3/7);
    const birthDur = (0.5 + Math.random() * 0.5) / 7;

    const colors = ['#FFD700', '#FFD700', '#FFD700', '#FFA500', '#FFCC00'];
    const color = colors[Math.floor(Math.random() * colors.length)];

    const wobbleAmpX = 3 + Math.random() * 2;
    const wobbleAmpY = 3 + Math.random() * 2;
    const wobbleFreqX = 0.3 + Math.random() * 0.4;
    const wobbleFreqY = 0.25 + Math.random() * 0.35;
    const wobblePhaseX = Math.random() * Math.PI * 2;
    const wobblePhaseY = Math.random() * Math.PI * 2;

    const rotSpeed = 1 + Math.random() * 2;
    const rotPhase = Math.random() * Math.PI * 2;

    particles.push({
      bx, by, tx, ty,
      rx, ry, color,
      birthStart, birthDur,
      wobbleAmpX, wobbleAmpY,
      wobbleFreqX, wobbleFreqY,
      wobblePhaseX, wobblePhaseY,
      rotSpeed, rotPhase
    });
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  init();
}
window.addEventListener('resize', resize);

function drawBoat(cx, cy, alpha) {
  const s = 0.7;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#fff';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // Hull
  ctx.beginPath();
  ctx.moveTo(-20*s, 0);
  ctx.lineTo(-22*s, 8*s);
  ctx.lineTo(22*s, 8*s);
  ctx.lineTo(20*s, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Main sail
  ctx.beginPath();
  ctx.moveTo(-2*s, 0);
  ctx.lineTo(-2*s, -28*s);
  ctx.lineTo(18*s, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Front sail
  ctx.beginPath();
  ctx.moveTo(-2*s, 0);
  ctx.lineTo(-2*s, -22*s);
  ctx.lineTo(-18*s, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function drawPaper(t, dissolveT) {
  const pr = getPaperRect();
  const fadeIn = t < 1/7 ? easeOut(t / (1/7)) : 1;

  // Draw paper as horizontal strips with individual dissolve timing
  const strips = 50;
  const sh = pr.h / strips;

  for (let i = 0; i < strips; i++) {
    const stripNorm = 1 - i / strips; // top=1, bottom=0
    const fadeStart = (1 - (0.4 + stripNorm * 0.6)) * 0.9;
    const stripAlpha = clamp(1 - (dissolveT - fadeStart) / 0.3, 0, 1);
    if (stripAlpha <= 0) continue;

    ctx.save();
    ctx.globalAlpha = 0.85 * stripAlpha * fadeIn;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(pr.x, pr.y + i * sh, pr.w, sh + 0.5);
    ctx.restore();
  }

  // Horizontal ruling lines
  ctx.strokeStyle = 'rgba(160,160,200,0.35)';
  ctx.lineWidth = 0.8;
  const lineSpacing = 28;
  const numLines = Math.floor((pr.h - 60) / lineSpacing);
  for (let i = 0; i < numLines; i++) {
    const ly = pr.y + 50 + i * lineSpacing;
    const lineNorm = 1 - (ly - pr.y) / pr.h;
    const lFadeStart = (1 - (0.4 + lineNorm * 0.6)) * 0.9;
    const lineAlpha = clamp(1 - (dissolveT - lFadeStart) / 0.3, 0, 1);
    if (lineAlpha <= 0) continue;
    ctx.save();
    ctx.globalAlpha = 0.35 * lineAlpha * fadeIn;
    ctx.beginPath();
    ctx.moveTo(pr.x + 18, ly);
    ctx.lineTo(pr.x + pr.w - 18, ly);
    ctx.stroke();
    ctx.restore();
  }

  // Chinese text in two vertical columns
  const col1Chars = ['亲', '爱', '的', '你', '好', '久', '不', '见'];
  const col2Chars = ['我', '一', '直', '想', '念', '你', '平', '安'];
  const allCols = [col1Chars, col2Chars];
  const colXs = [pr.x + 65, pr.x + 125];

  ctx.textAlign = 'center';
  ctx.font = '15px serif';

  for (let col = 0; col < 2; col++) {
    const chars = allCols[col];
    for (let row = 0; row < chars.length; row++) {
      const cx2 = colXs[col];
      const cy2 = pr.y + 55 + row * 30;
      const charNorm = 1 - (cy2 - pr.y) / pr.h;
      const cDissolveScore = (col === 1 ? 0.6 : 0.25) + charNorm * 0.35;
      const cFadeStart = (1 - Math.min(cDissolveScore, 1)) * 0.85;
      const charAlpha = clamp(1 - (dissolveT - cFadeStart) / 0.25, 0, 1);
      if (charAlpha <= 0) continue;
      ctx.save();
      ctx.globalAlpha = 0.7 * charAlpha * fadeIn;
      ctx.fillStyle = 'rgba(70,70,110,0.85)';
      ctx.fillText(chars[row], cx2, cy2);
      ctx.restore();
    }
  }
}

function drawLines(boatCx, boatCy, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';

  const boatTipX = boatCx + 14 * 0.7;
  const boatTipY = boatCy - 20 * 0.7;

  const arcTs = [0.12, 0.30, 0.50];

  for (let i = 0; i < arcTs.length; i++) {
    const ep = getArcPoint(arcTs[i]);
    const midX = (boatTipX + ep.x) * 0.5;
    const midY = (boatTipY + ep.y) * 0.5;
    const cpx = midX + (i - 1) * 25;
    const cpy = midY - 35;

    ctx.globalAlpha = alpha * (0.6 + i * 0.1);
    ctx.beginPath();
    ctx.moveTo(boatTipX, boatTipY);
    ctx.quadraticCurveTo(cpx, cpy, ep.x, ep.y);
    ctx.stroke();
  }

  ctx.restore();
}

let lastTime = null;
let elapsed = 0;

function draw(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  elapsed += dt;

  if (!W || !H) { requestAnimationFrame(draw); return; }

  const t = (elapsed % CYCLE) / CYCLE;
  const cycleSecs = t * CYCLE;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(0, 0, W, H);

  // dissolveT: 0 at t=1/7, 1 at t=4/7
  const dissolveStart = 1/7;
  const dissolveEnd = 4/7;
  let dissolveT = 0;
  if (t >= dissolveStart && t <= dissolveEnd) {
    dissolveT = (t - dissolveStart) / (dissolveEnd - dissolveStart);
  } else if (t > dissolveEnd) {
    dissolveT = 1;
  }

  // Global fade out: t=5/7 to 1.0
  const fadeOutStart = 5/7;
  let globalFade = 1;
  if (t >= fadeOutStart) {
    const ft = (t - fadeOutStart) / (1 - fadeOutStart);
    globalFade = ft < 0.65 ? 1 : 1 - easeInOut((ft - 0.65) / 0.35);
  }

  // Boat position: moves right-upward slowly
  const boatProg = clamp(t / (5/7), 0, 1);
  const boatBaseX = lerp(W * 0.18, W * 0.30, easeInOut(boatProg));
  const boatBaseY = lerp(H * 0.58, H * 0.50, easeInOut(boatProg));
  const boatBobY = Math.sin(cycleSecs * Math.PI * 2 * 0.5) * 4;
  const boatX = boatBaseX;
  const boatY = boatBaseY + boatBobY;

  const boatAlpha = clamp(t / (1/7), 0, 1) * globalFade;

  // Draw paper
  drawPaper(t, dissolveT);

  // Draw particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (t < p.birthStart) continue;

    const birthElapsed = t - p.birthStart;
    const birthProgress = clamp(birthElapsed / p.birthDur, 0, 1);

    let px, py, palpha;

    if (birthProgress < 1) {
      const ep = easeOut(birthProgress);
      px = lerp(p.bx, p.tx, ep);
      py = lerp(p.by, p.ty, ep);
      palpha = birthProgress;
    } else {
      const idleSecs = cycleSecs - (p.birthStart + p.birthDur) * CYCLE;
      px = p.tx + Math.sin(idleSecs * Math.PI * 2 * p.wobbleFreqX + p.wobblePhaseX) * p.wobbleAmpX;
      py = p.ty + Math.sin(idleSecs * Math.PI * 2 * p.wobbleFreqY + p.wobblePhaseY) * p.wobbleAmpY;
      palpha = 1;
    }

    palpha *= globalFade;
    if (palpha <= 0) continue;

    const flipRx = Math.abs(Math.cos(cycleSecs * p.rotSpeed + p.rotPhase)) * p.rx;

    ctx.save();
    ctx.globalAlpha = palpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(px, py, Math.max(0.8, flipRx), p.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Connecting lines
  const linesAlpha = clamp((t - 1.2/7) / (0.5/7), 0, 1) * globalFade;
  drawLines(boatX, boatY, linesAlpha);

  // Boat
  drawBoat(boatX, boatY, boatAlpha);

  requestAnimationFrame(draw);
}

resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
