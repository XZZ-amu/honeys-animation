site_name: Honeys 动画设计
site_url: https://xzz-amu.github.io/honeys-animation/
site_description: Honeys 动画设计项目文档
theme:
  name: material
  language: zh
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: 切换到深色模式
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: 切换到浅色模式
  features:
  - navigation.instant
  - navigation.tabs
  - navigation.top
  - toc.follow
  - search.suggest
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- toc:
    permalink: true
nav:
- 首页: index.md
- 参考资料:
  - Claude Code Harness 拆解: reference-claude-code-harness.md
  - 创作类 Agent 难题与解法: reference-creative-agent-harness.md
- 调研:
  - 创作类 AI Agent 开源项目调研: research-creative-agents.md
- 设计决策:
  - 01 意图澄清机制: decisions/01-intent-clarification.md
  - 02 迭代锁定机制: decisions/02-iteration-lock-mechanism.md
  - 03 参数推导体系: decisions/03-parameter-derivation.md
  - 04 评估机制: decisions/04-evaluation-mechanism.md
  - 05 失败修复策略: decisions/05-failure-recovery.md
  - 06 持续改进: decisions/06-continuous-improvement.md
- Harness:
  - 风格规范: style-spec.md
- 调研补充:
  - 一致性漂移解法: research-consistency.md
